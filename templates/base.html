<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <title>{% block title %}Card Catalog{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="/static/app.css" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop offset='0' stop-color='%23f0d690'/%3E%3Cstop offset='1' stop-color='%23b89240'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='4' y='4' width='24' height='24' rx='4' fill='none' stroke='url(%23g)' stroke-width='2' transform='rotate(-6 16 16)'/%3E%3Crect x='4' y='4' width='24' height='24' rx='4' fill='none' stroke='url(%23g)' stroke-width='2' transform='rotate(6 16 16)' opacity='0.5'/%3E%3C/svg%3E" />
    <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
    <script src="/static/js/app.js" defer></script>
  </head>
  <body hx-boost="false">
    <div class="app">
      {% include "partials/nav.html" %}
      <main class="main">
        {% block content %}{% endblock %}
      </main>
    </div>

    <div id="toast-stack" class="toast-stack"></div>
    <div id="slideover-mount"></div>
    <div id="modal-mount"></div>

    {% block scripts %}{% endblock %}
  </body>
</html>
