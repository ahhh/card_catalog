{# Sticky bottom bar — visibility toggled by app.js when .row-check boxes are selected.
   Inputs declared with form="bulk-form" so they POST together. #}
<style>
  .bulk-bar { padding: 10px 14px 10px 18px; }
  .bulk-bar__action {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: var(--ink-3);
    border: 1px solid var(--ink-5);
    border-radius: var(--r-sm);
    font-size: 12px;
    color: var(--text-1);
    cursor: pointer;
    transition: background var(--d-fast), border-color var(--d-fast);
  }
  .bulk-bar__action:hover { background: var(--ink-4); border-color: var(--ink-6); }
  .bulk-bar__action svg { width: 14px; height: 14px; }
  .bulk-bar details { position: relative; }
  .bulk-bar details > summary { list-style: none; cursor: pointer; }
  .bulk-bar details > summary::-webkit-details-marker { display: none; }
  .bulk-bar__popover {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 0;
    background: var(--ink-2);
    border: 1px solid var(--ink-5);
    border-radius: var(--r-md);
    box-shadow: var(--shadow-3);
    padding: 10px;
    min-width: 200px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 1;
  }
  .bulk-bar__popover .input,
  .bulk-bar__popover .select { font-size: 12px; padding: 6px 8px; }
  .bulk-bar__divider {
    width: 1px;
    height: 18px;
    background: var(--ink-5);
  }
</style>

<form id="bulk-form" method="post" action="/collection/bulk-edit"
      hx-post="/collection/bulk-edit"
      hx-target="#card-table"
      hx-swap="innerHTML"
      hx-include="#filter-form">

  <div id="bulk-bar" class="bulk-bar" role="region" aria-label="Bulk actions">
    <span><span class="bulk-bar__count">0</span> selected</span>
    <span class="bulk-bar__divider" aria-hidden="true"></span>

    {# Tag #}
    <details>
      <summary class="bulk-bar__action" title="Add tag">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.59 13.41L13.42 20.58a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7" cy="7" r="1.5"/>
        </svg>
        Tag
      </summary>
      <div class="bulk-bar__popover" onclick="event.stopPropagation()">
        <input class="input" type="text" name="tag_name" placeholder="Tag name…" autocomplete="off" />
        <button type="submit" class="btn btn--primary btn--sm" name="action" value="tag">Apply tag</button>
      </div>
    </details>

    {# Condition #}
    <details>
      <summary class="bulk-bar__action" title="Set condition">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/></svg>
        Condition
      </summary>
      <div class="bulk-bar__popover" onclick="event.stopPropagation()">
        <select class="select" name="condition">
          <option value="">— Set condition —</option>
          {% for value, label in editor.conditions %}
            <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>
        <button type="submit" class="btn btn--primary btn--sm" name="action" value="update">Apply</button>
      </div>
    </details>

    {# Finish #}
    <details>
      <summary class="bulk-bar__action" title="Set finish">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 6.6L21 11l-5.4 4.2L17 22l-5-3.4L7 22l1.4-6.8L3 11l6.6-2.4z"/></svg>
        Finish
      </summary>
      <div class="bulk-bar__popover" onclick="event.stopPropagation()">
        <select class="select" name="finish">
          <option value="">— Set finish —</option>
          {% for value, label in editor.finishes %}
            <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>
        <button type="submit" class="btn btn--primary btn--sm" name="action" value="update">Apply</button>
      </div>
    </details>

    {# Trade #}
    <details>
      <summary class="bulk-bar__action" title="Mark for trade">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h13l-3-3M17 17H4l3 3"/></svg>
        Trade
      </summary>
      <div class="bulk-bar__popover" onclick="event.stopPropagation()">
        <select class="select" name="for_trade">
          <option value="1">Mark for trade</option>
          <option value="0">Unmark for trade</option>
        </select>
        <button type="submit" class="btn btn--primary btn--sm" name="action" value="update">Apply</button>
      </div>
    </details>

    <span class="spacer"></span>
    <span class="bulk-bar__divider" aria-hidden="true"></span>

    <button type="submit" class="bulk-bar__action" name="action" value="delete"
            style="color: var(--danger); border-color: rgba(227,96,73,0.4); background: rgba(227,96,73,0.08);"
            hx-confirm="Delete the selected entries? This can't be undone.">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
      Delete
    </button>

    <input type="hidden" name="entry_ids" value="" />
  </div>
</form>
